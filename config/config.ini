; ============================================================
;  ROV Control Station — 配置文件
; ============================================================

; --- 键盘映射（无手柄时替代方案） ---
[keyboard]
key_forward = W
key_backward = S
key_yaw_left = A
key_yaw_right = D
key_strafe_left = Left
key_strafe_right = Right
key_ascend = Up
key_descend = Down
key_mode_toggle = X
key_mode_reverse = X
key_claw_open = Q
key_claw_close = E
key_snapshot = P
key_record = R

; --- 手柄轴映射 ---
; max 的符号决定方向：负值表示摇杆正向→ROV负向
[joystick]
mode_long_press = 400
btn_mode = 2
btn_claw_open = 4
btn_claw_close = 5
poll_interval = 1.0

[x]
max = 6000.0
axis = 2
deadzone = 0.05

[y]
max = 5000.0
axis = 1
deadzone = 0.05

[z]
max = 6000.0
axis = 3
deadzone = 0.05

[yaw]
max = 1000.0
axis = 0
deadzone = 0.05

; --- 速度档位 ---
[speed_modes]
mode0_name = SLOW
mode0_rate = 0.30
mode1_name = MEDIUM
mode1_rate = 0.60
mode2_name = FAST
mode2_rate = 1.00

; --- 媒体输出路径 ---
[media]
screenshot_dir = screenshots
record_dir = recordings

; --- 串口通信 ---
[serial]
port = COM8
baudrate = 115200
timeout = 0.05
poll_interval = 0.001
reconnect_interval = 2.0

; --- 摄像头 ---
[camera]
id = 0
width = 640
height = 480

; --- 控制循环 ---
[control]
frequency = 125

; --- 过流保护 ---
[overcurrent]
threshold = 10.0
refresh_interval = 500

